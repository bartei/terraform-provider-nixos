name: Acceptance

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache /nix/store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86 qemu-utils

      - name: Probe KVM
        run: |
          if [ -e /dev/kvm ] && [ -r /dev/kvm ] && [ -w /dev/kvm ]; then
            echo "KVM available — accelerated"
          else
            echo "KVM not available — falling back to TCG (slow)"
            ls -l /dev/kvm 2>&1 || true
          fi

      - name: Build VM image
        run: ./build.sh
        working-directory: test/qemu

      - name: Boot VM
        run: ./run.sh > .vm-host
        working-directory: test/qemu
        env:
          NIXOS_TEST_BOOT_TIMEOUT: "300"

      - name: Run acceptance tests
        run: |
          export TF_ACC=1
          export NIXOS_TEST_HOST=$(cat test/qemu/.vm-host)
          export NIXOS_TEST_KEY_PATH=$PWD/test/qemu/.keys/id_ed25519
          export NIXOS_TEST_USER=root
          go test -v -count=1 -timeout 30m ./internal/resource/...

      - name: Dump VM serial log on failure
        if: failure()
        run: |
          echo "::group::VM serial log"
          tail -200 test/qemu/serial.log || true
          echo "::endgroup::"

      - name: Stop VM
        if: always()
        run: ./stop.sh
        working-directory: test/qemu
